<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Topic Explorer</title>
    <script src="mqtt.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        #connection-status {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .connected {
            background-color: #d4edda;
            color: #155724;
        }
        .disconnected {
            background-color: #f8d7da;
            color: #721c24;
        }
        #topic-tree {
            list-style-type: none;
            padding-left: 0;
        }
        #topic-tree ul {
            list-style-type: none;
            padding-left: 20px;
        }
        .topic-node {
            margin: 5px 0;
            cursor: pointer;
        }
        .topic-name {
            font-weight: bold;
        }
        .topic-value {
            color: #666;
            margin-left: 10px;
            font-family: monospace;
        }
        .retained {
            color: #28a745;
            font-weight: bold;
        }
        .retained-marker {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #28a745;
            border-radius: 50%;
            margin-right: 5px;
        }
        .loading {
            color: #6c757d;
            font-style: italic;
        }
        #broker-form {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>MQTT Topic Explorer</h1>
    
    <div id="broker-form">
        <label for="broker-url">Broker URL:</label>
        <input type="text" id="broker-url" value="ws://localhost:9001" size="40">
        <button id="connect-btn">Connect</button>
        <button id="disconnect-btn" disabled>Disconnect</button>
    </div>
    
    <div id="connection-status" class="disconnected">
        Disconnected
    </div>
    
    <div>
        <h2>Topic Hierarchy</h2>
        <div id="topic-tree-container">
            <ul id="topic-tree"></ul>
        </div>
    </div>

    <script>
        // Global variables
        let client = null;
        const topics = {};
        const retainedTopics = new Set();

        // DOM elements
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const brokerUrlInput = document.getElementById('broker-url');
        const connectionStatus = document.getElementById('connection-status');
        const topicTree = document.getElementById('topic-tree');

        // Connect to broker
        connectBtn.addEventListener('click', () => {
            const brokerUrl = brokerUrlInput.value.trim();
            if (!brokerUrl) return;
            
            connectBtn.disabled = true;
            connectionStatus.textContent = "Connecting...";
            connectionStatus.className = "";
            
            // Create client
            client = mqtt.connect(brokerUrl, {
                clientId: 'mqtt-explorer-' + Math.random().toString(16).substr(2, 8),
                clean: true,
                connectTimeout: 4000
            });

            // Connection handlers
            client.on('connect', () => {
                connectionStatus.textContent = "Connected to " + brokerUrl;
                connectionStatus.className = "connected";
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                
                // Subscribe to all topics
                client.subscribe('#', (err) => {
                    if (err) {
                        console.error("Subscription error:", err);
                    } else {
                        console.log("Subscribed to all topics");
                    }
                });
            });

            client.on('error', (err) => {
                connectionStatus.textContent = "Connection error: " + err.message;
                connectionStatus.className = "disconnected";
                connectBtn.disabled = false;
                console.error("Connection error:", err);
            });

            client.on('close', () => {
                connectionStatus.textContent = "Disconnected";
                connectionStatus.className = "disconnected";
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            });

            // Message handler
            client.on('message', (topic, message, packet) => {
                // Store topic value
                const value = message.toString();
                topics[topic] = value;
                
                // Check if retained
                if (packet.retain) {
                    retainedTopics.add(topic);
                } else {
                    retainedTopics.delete(topic);
                }
                
                // Update the tree display
                updateTopicTree();
            });
        });

        // Disconnect from broker
        disconnectBtn.addEventListener('click', () => {
            if (client) {
                client.end();
            }
        });

        // Build the topic tree structure
        function updateTopicTree() {
            // Clear existing tree
            topicTree.innerHTML = '';
            
            // Build a hierarchical structure
            const root = { children: {} };
            
            // Process all topics
            Object.keys(topics).sort().forEach(fullTopic => {
                const parts = fullTopic.split('/');
                let current = root;
                
                parts.forEach((part, index) => {
                    if (!current.children[part]) {
                        current.children[part] = {
                            name: part,
                            fullPath: parts.slice(0, index + 1).join('/'),
                            children: {},
                            isLeaf: index === parts.length - 1
                        };
                    }
                    current = current.children[part];
                });
            });
            
            // Render the tree
            renderTree(root, topicTree);
        }

        // Recursively render the topic tree
        function renderTree(node, parentElement) {
            const children = Object.values(node.children);
            children.sort((a, b) => a.name.localeCompare(b.name));
            
            children.forEach(child => {
                const li = document.createElement('li');
                li.className = 'topic-node';
                
                const span = document.createElement('span');
                span.className = 'topic-name';
                
                // Add retained marker if this is a retained topic
                if (retainedTopics.has(child.fullPath)) {
                    const retainedMarker = document.createElement('span');
                    retainedMarker.className = 'retained-marker';
                    retainedMarker.title = 'Retained message';
                    span.appendChild(retainedMarker);
                }
                
                span.appendChild(document.createTextNode(child.name));
                li.appendChild(span);
                
                // Add value if this is a leaf node
                if (child.isLeaf) {
                    const valueSpan = document.createElement('span');
                    valueSpan.className = 'topic-value';
                    if (retainedTopics.has(child.fullPath)) {
                        valueSpan.classList.add('retained');
                    }
                    valueSpan.textContent = topics[child.fullPath];
                    li.appendChild(valueSpan);
                }
                
                parentElement.appendChild(li);
                
                // Add children if they exist
                if (Object.keys(child.children).length > 0) {
                    const ul = document.createElement('ul');
                    li.appendChild(ul);
                    renderTree(child, ul);
                }
            });
        }

        // Initialize with empty tree
        updateTopicTree();
    </script>
</body>
</html>
