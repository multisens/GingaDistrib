<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicação DTV Remote Device</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="config-panel">
                <div class="sidebar-header">
                    <h3>Controle DTV</h3>
                    <button id="toggleConfigBtn" class="btn-icon" title="Mostrar/ocultar configurações">
                        <i class="fas fa-sliders-h"></i>
                    </button>
                </div>
                <div class="config-section" id="configSection">
                    <h4><i class="fas fa-cog"></i> Configurações</h4>
                    <div class="form-group">
                        <label for="serverUrl">URL do Servidor:</label>
                        <input type="text" id="serverUrl" placeholder="Digite a URL do servidor">
                    </div>
                    <div class="form-group">
                        <label for="deviceClass">Device Class:</label>
                        <input type="text" id="deviceClass" placeholder="Digite a classe do dispositivo">
                    </div>
                    <div class="form-group">
                        <label>Supported Types:</label>
                        <div class="checkbox-group">
                            <!-- <label><input type="checkbox" class="supported-type" value="video/mp4" checked> video/mp4</label> -->
                            <!-- <label><input type="checkbox" class="supported-type" value="audio/mpeg" checked> audio/mpeg</label> -->
                            <!-- <label><input type="checkbox" class="supported-type" value="image/png" checked> image/png</label> -->
                            <!-- <label><input type="checkbox" class="supported-type" value="text/plain" checked> text/plain</label> -->
                            <label><input type="checkbox" class="supported-type" value="application/x-ncl360" checked> application/x-ncl360</label>
                        </div>
                    </div>
                    <button id="connectBtn" class="btn-primary">Conectar</button>
                    <div class="connection-status">
                        <div id="restStatus" class="status-indicator">
                            <span class="status-dot"></span> REST: Não conectado
                        </div>
                        <div id="wsStatus" class="status-indicator">
                            <span class="status-dot"></span> WebSocket: Não conectado
                        </div>
                    </div>
                </div>
                <div class="current-handle">
                    <h4>Handle Atual:</h4>
                    <div id="currentHandle">Nenhum</div>
                </div>
                <div class="node-info">
                    <h4>Informações do Nó:</h4>
                    <div><strong>nodeId:</strong> <span id="nodeIdValue">-</span></div>
                    <div><strong>nodeSrc:</strong> <span id="nodeSrcValue">-</span></div>
                    <div><strong>appId:</strong> <span id="appIdValue">-</span></div>
                    <div><strong>type:</strong> <span id="typeValue">-</span></div>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="timeline-header">
                <h2><i class="fas fa-stream"></i> Linha do Tempo de Mensagens</h2>
            </div>
            <div id="messageTimeline" class="message-timeline">
                <div class="empty-state">
                    <i class="fas fa-comment-slash"></i>
                    <p>Nenhuma mensagem recebida ainda</p>
                </div>
            </div>
        </div>
        
        <div class="response-modal" id="responseModal">
            <div class="modal-content">
                <h3>Responder Mensagem</h3>
                <div class="form-group">
                    <label for="responseEventType">Event Type:</label>
                    <select id="responseEventType">
                        <option value="presentation">presentation</option>
                        <option value="preparation">preparation</option>
                        <option value="attribution">attribution</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="responseTransition">Transition:</label>
                    <select id="responseTransition">
                        <option value="starts">starts</option>
                        <option value="stops">stops</option>
                        <option value="pauses">pauses</option>
                        <option value="resumes">resumes</option>
                        <option value="aborts">aborts</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="responseLabel">Label (opcional):</label>
                    <input type="text" id="responseLabel" placeholder="Digite o label se necessário">
                </div>
                <div class="modal-buttons">
                    <button id="cancelResponseBtn" class="btn-secondary">Cancelar</button>
                    <button id="sendResponseBtn" class="btn-primary">Enviar Resposta</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
